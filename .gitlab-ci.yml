default:
  image: node:22
  tags:
    - SERVER-docker-runner

stages:
  - typecheck
  - test
  - publish

typecheck:
  stage: typecheck
  script:
    - npm ci
    - npm run typecheck

test:
  stage: test
  script:
    - npm ci
    - npm run test

publish:
  stage: publish
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm ci
    - npm run build
    - npx changeset publish
